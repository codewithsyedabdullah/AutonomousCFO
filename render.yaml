services:
  - type: web
    name: autocfo-backend
    env: node
    region: ohio
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "3001"
      - key: CORS_ORIGIN
        value: https://autocfo.vercel.app
      - key: AI_API_KEY
        sync: false
      - key: AI_API_TYPE
        value: openai
      - key: AI_API_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: AI_MODEL
        value: llama-3.3-70b-versatile
      - key: DATABASE_URL
        value: /data/autocfo.db
