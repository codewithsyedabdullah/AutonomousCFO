services:
  - type: web
    name: autocfo-backend
    runtime: node
    repo: https://github.com/codewithsyedabdullah/AutonomousCFO
    plan: free
    region: oregon
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: "10000"
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://autocfo.vercel.app
      - key: AI_API_TYPE
        value: openai
      - key: AI_API_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: AI_MODEL
        value: llama-3.3-70b-versatile
      - key: DATABASE_URL
        fromDatabase:
          name: autocfo-db
          property: connectionString
      - key: AI_API_KEY
        sync: false

databases:
  - name: autocfo-db
    plan: free
    region: oregon
    postgresMajorVersion: 16